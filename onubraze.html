<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braze Web SDK 연동 데모</title>
  <style>
    :root {
      --bg: #EDF1F8;
      --surface: #FFFFFF;
      --ink: #0A2545;
      --ink-soft: #46566E;
      --ink-faint: #8492A8;
      --line: #D5DEEC;
      --yonsei: #00337F;
      --yonsei-mid: #1E5FB0;
      --good: #1B7F5A;
      --warn: #B25A00;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--ink-soft);
      font-family: -apple-system, "Apple SD Gothic Neo", system-ui, sans-serif;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: 0 8px 28px rgba(10, 37, 69, 0.08);
    }
    .eyebrow {
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin: 0 0 8px;
    }
    h1 {
      font-family: Georgia, "Apple SD Gothic Neo", serif;
      color: var(--ink);
      font-size: 28px;
      margin: 0 0 20px;
    }
    h1 .accent { color: var(--yonsei); }
    p { line-height: 1.6; margin: 0 0 16px; }
    button {
      appearance: none;
      border: none;
      background: var(--yonsei);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 24px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
      width: 100%;
    }
    button:hover { background: var(--yonsei-mid); transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    button:focus-visible { outline: 3px solid var(--yonsei-mid); outline-offset: 2px; }
    .status {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      background: #F6F9FD;
      border: 1px solid var(--line);
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
      font-size: 13px;
      color: var(--ink-faint);
      min-height: 20px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .status.ok { color: var(--good); border-color: #B9E2D0; background: #ECF8F2; }
    .status.err { color: var(--warn); border-color: #F0D9BE; background: #FBF2E6; }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Braze Web SDK · In-App Message</p>
    <h1>커머스 <span class="accent">이벤트</span> 데모</h1>
    <p>아래 버튼을 누르면 <code>commerce_view</code> Braze 커스텀 이벤트가 발생합니다. 인앱 메시지는 SDK가 자동으로 표시합니다.</p>

    <button id="commerce-view-btn" type="button">commerce_view 이벤트 호출</button>

    <div class="status" id="status">SDK 초기화 대기 중…</div>
  </main>

  <script>
    // ────────────────────────────────────────────────────────────────
    // ⚠️ 아래 두 값을 본인의 Braze 워크스페이스 값으로 교체하세요.
    //   - API_KEY : Braze 대시보드 > Settings > APIs and Identifiers > Web SDK
    //   - BASE_URL: 워크스페이스가 위치한 SDK 엔드포인트 (예: sdk.iad-01.braze.com)
    // ────────────────────────────────────────────────────────────────
    const BRAZE_API_KEY = "YOUR-API-KEY";
    const BRAZE_BASE_URL = "sdk.iad-01.braze.com";

    const statusEl = document.getElementById("status");
    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    // 공식 Braze Web SDK CDN 로더 — 스크립트를 비동기로 주입하고 onload 후 초기화
    (function () {
      const script = document.createElement("script");
      script.src = "https://js.appboycdn.com/web-sdk/4.8/braze.min.js";
      script.async = true;
      script.addEventListener("load", function () {
        try {
          // 1) SDK 초기화
          window.braze.initialize("5195e134-c2c9-4bdb-8431-ee5fca29b935", {
            baseUrl: "sdk.iad-03.braze.com",
            enableLogging: true,
          });

          // 2) 인앱 메시지 자동 표시 등록 (openSession 전에 호출)
          window.braze.automaticallyShowInAppMessages();

          // 3) 사용자 식별 (데모용 고정 ID — 실제로는 로그인 사용자 ID 사용)
          window.braze.changeUser("demo-user-001");

          // 4) 세션 시작 (인앱 메시지 fetch 트리거)
          window.braze.openSession();

          setStatus("✅ Braze SDK 초기화 완료. 버튼을 눌러 이벤트를 호출하세요.", "ok");
        } catch (e) {
          setStatus("초기화 실패: " + e.message, "err");
        }
      });
      script.addEventListener("error", function () {
        setStatus("Braze SDK 스크립트 로드 실패 (네트워크 확인)", "err");
      });
      document.body.appendChild(script);
    })();

    // 버튼 클릭 → commerce_view 커스텀 이벤트
    document.getElementById("commerce-view-btn").addEventListener("click", function () {
      if (!window.braze) {
        setStatus("SDK가 아직 로드되지 않았습니다.", "err");
        return;
      }
      // 커스텀 이벤트 호출 (필요 시 두 번째 인자로 속성 객체 전달 가능)
      window.braze.logCustomEvent("commerce_view", {
        source: "web-demo",
        page: "home",
      });
      // 데모에서는 즉시 서버로 flush (기본은 배치 전송)
      window.braze.requestImmediateDataFlush();

      const ts = new Date().toLocaleTimeString();
      setStatus("📤 commerce_view 이벤트 전송됨 @ " + ts, "ok");
    });
  </script>
</body>
</html>
